<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0"
    />
    <title>Toon Weather Globe</title>
    <style>
      html, body, #app {
        height: 100%;
        margin: 0;
        background: #f5f7fb;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }
      .toolbar {
        position: absolute;
        top: 12px;
        left: 12px;
        display: flex;
        gap: 8px;
        padding: 8px 10px;
        background: rgba(255,255,255,0.8);
        border-radius: 8px;
        box-shadow: 0 4px 16px rgba(0,0,0,0.08);
      }
      .toolbar button {
        padding: 6px 10px;
        border-radius: 6px;
        border: 1px solid #00000012;
        background: #ffffff;
        cursor: pointer;
      }
      .canvas-wrap {
        width: 100%;
        height: 100%;
        position: relative;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
